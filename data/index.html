<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>7seg-clock-pro Web設定画面</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main>
    <h1>7seg-clock-pro</h1>
    <h2 class="page-title">Web設定画面</h2>
    <p id="status">状態を取得中...</p>
    <form id="config">
      <section>
        <h2>手動日時設定</h2>
        <label>手動日時<input id="manualTime" type="datetime-local"></label>
        <button id="setTime" type="button">手動時刻を設定</button>
      </section>

      <section>
        <h2>NTPから手動日時設定（取得）</h2>
        <p>インターネットから時刻を取得し、RTCと時刻表示を補正します。</p>
        <button id="syncNtp" type="button">NTPから時刻を取得</button>
      </section>

      <section>
        <h2>LED表示設定</h2>
        <label>明るさ <output id="brightnessValue"></output><input id="brightness" name="brightness" type="range" min="1" max="255"></label>
        <label>色モード
          <select name="ledMode">
            <option value="0">単色</option>
            <option value="1">桁別色</option>
            <option value="2">グラデーション</option>
            <option value="3">虹色</option>
            <option value="4">アニメーション</option>
          </select>
        </label>
        <label>単色<input name="solidColor" type="color"></label>
        <label>桁1 / グラデーション開始<input name="digit0" type="color"></label>
        <label>桁2<input name="digit1" type="color"></label>
        <label>桁3<input name="digit2" type="color"></label>
        <label>桁4 / グラデーション終了<input name="digit3" type="color"></label>
        <label>アニメーション速度<input name="animationSpeed" type="range" min="1" max="128"></label>
      </section>

      <section>
        <h2>スリープ設定</h2>
        <label><input name="sleepEnabled" type="checkbox"> スリープを有効化</label>
        <label>開始<input name="sleepStart" type="time"></label>
        <label>終了<input name="sleepEnd" type="time"></label>
      </section>

      <section>
        <h2>チャイム設定</h2>
        <p>曜日は「月〜金」、または毎日を選択できます。メロディは現在1種類です。</p>
        <div id="chimes"></div>
        <button id="addChime" type="button">チャイムを追加</button>
      </section>

      <section id="debugPanel" class="debug">
        <button id="debugToggle" type="button" class="debug-toggle">デバッグを開く</button>
        <div id="debugButtons" class="debug-buttons hidden">
          <h2>認証・Wi-Fi / NTP設定</h2>
          <p>パスワード欄は変更時のみ入力してください。空欄のまま保存すると現在値を維持します。</p>
          <label>Web管理ユーザー<input name="webAdminUser" maxlength="32"></label>
          <label>Web管理パスワード<input name="webAdminPassword" type="password" maxlength="64" autocomplete="new-password" placeholder="変更時のみ入力"></label>
          <label>OTAパスワード<input name="otaPassword" type="password" maxlength="64" autocomplete="new-password" placeholder="変更時のみ入力"></label>
          <label>Wi-Fi SSID<input name="wifiSsid" maxlength="32"></label>
          <label>Wi-Fiパスワード<input name="wifiPassword" type="password" maxlength="64" autocomplete="new-password" placeholder="変更時のみ入力"></label>
          <label>NTPサーバー<input name="ntp0" maxlength="63"></label>

          <h2>デバッグ機能</h2>
          <button data-debug="/api/debug/led-all" type="button">全LED点灯</button>
          <button data-debug="/api/debug/led-chase" type="button">1つずつ順番に点灯</button>
          <button data-debug="/api/debug/chime" type="button">チャイムテスト</button>
          <button data-debug="/api/debug/oled" type="button">OLEDテスト</button>
          <button data-debug="/api/debug/rtc" type="button">RTCテスト</button>
          <button data-debug="/api/debug/ntp" type="button">NTPアクセステスト</button>
          <button data-debug="/api/debug/ota-enable" type="button">OTAを5分間有効化</button>
          <button data-debug="/api/debug/online-firmware-update" type="button">オンライン一括更新</button>
        </div>
      </section>

      <button type="submit">保存</button>
    </form>
    <p id="result" role="status"></p>
  </main>
  <script src="/script.js"></script>
</body>
</html>
